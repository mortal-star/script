name: GLaDOS Checkin

on:
  workflow_dispatch:
  schedule:
    - cron: "5 16 * * *"

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checkin
        env:
          GLADOS_ACCOUNTS: ${{ secrets.GLADOS_ACCOUNTS }}
        run: python checkin.py

